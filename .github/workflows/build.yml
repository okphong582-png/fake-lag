name: Build FakeLag IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build FakeLagTunnel extension (no signing)
      run: |
        xcodebuild build \
          -project FakeLag.xcodeproj \
          -target FakeLagTunnel \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PROVISIONING_PROFILE="" \
          DEVELOPMENT_TEAM="" \
          BUILD_DIR="$(pwd)/build"

    - name: Build FakeLag main app (no signing)
      run: |
        xcodebuild build \
          -project FakeLag.xcodeproj \
          -target FakeLag \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PROVISIONING_PROFILE="" \
          DEVELOPMENT_TEAM="" \
          BUILD_DIR="$(pwd)/build" > xcodebuild.log 2>&1 || (cat xcodebuild.log && exit 1)

    - name: Commit build errors if failed
      if: failure()
      run: |
        mkdir -p build_logs
        cp xcodebuild.log build_logs/errors.txt || true
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add build_logs/errors.txt
        git commit -m "chore: save build errors [skip ci]" || true
        git push

    - name: Show build output structure
      run: |
        echo "=== Build dir ==="
        find $(pwd)/build/Release-iphoneos -maxdepth 3 2>/dev/null || true

    - name: Package IPA (unsigned, includes tunnel extension)
      run: |
        APP_PATH=$(find $(pwd)/build/Release-iphoneos -name "FakeLag.app" -type d | head -1)
        echo "Main .app: $APP_PATH"

        mkdir -p Payload
        cp -r "$APP_PATH" Payload/

        # Verify the PlugIns/FakeLagTunnel.appex is embedded
        ls -la "Payload/FakeLag.app/PlugIns/" 2>/dev/null || echo "No PlugIns dir yet"

        zip -qr FakeLag.tipa Payload/
        echo "TIPA created: $(ls -lh FakeLag.tipa)"

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeLag-TIPA
        path: FakeLag.tipa
        retention-days: 30

    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "FakeLag v${{ github.run_number }} - System Lag"
        body: |
          ## FakeLag iOS App - System-wide Network Lag (TrollStore TIPA)

          ### 🌐 Tính năng mới: Nút nổi làm lag trong trận (TrollStore)
          - **Floating Button** — Nhấn START trong app sẽ hiện một nút tròn nổi màu xanh di chuyển được khắp màn hình chính và đè lên game khác.
          - **Packet Tunnel VPN** — Khi nhấn vào nút nổi, VPN tunnel kích hoạt làm nghẽn (lag) toàn hệ thống từ 0ms -> 600ms -> 0ms trong 4 giây rồi tự tắt.
          - Lần đầu chạy: iOS sẽ hỏi "Add VPN Configuration?" → bấm **Allow**

          ### 📱 Cài đặt (cần TrollStore)
          - **TrollStore**: Cài đặt file TIPA này qua TrollStore để các quyền hệ thống (no-sandbox, system overlay, network extension) hoạt động.

          ### 🎮 Hướng dẫn sử dụng
          1. Mở app FakeLag, nhấn nút **START**.
          2. Nút nổi tròn màu xanh sẽ xuất hiện, đồng thời app tự mở **Free Fire** (hoặc Free Fire MAX).
          3. Khi đang chơi game, nếu muốn đối thủ bị lag đơ 2 giây, hãy chạm vào **nút nổi**. Nút nổi sẽ chuyển sang màu đỏ và kích hoạt lag trong 4 giây.
          4. Sau 4 giây, lag tự tắt và nút nổi chuyển về màu xanh.
          5. Để đóng nút nổi, quay lại app và bấm **STOP**.

          ### ⚙️ Kỹ thuật
          - `NEPacketTunnelProvider` intercepts all IP packets
          - App Group `group.com.fakelag.app` để sync trạng thái giữa app và tunnel
          - Fallback về URLProtocol nếu VPN setup thất bại

        files: FakeLag.tipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

