name: Build FakeLag IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build FakeLagTunnel extension (no signing)
      run: |
        xcodebuild build \
          -project FakeLag.xcodeproj \
          -scheme FakeLagTunnel \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PROVISIONING_PROFILE="" \
          DEVELOPMENT_TEAM="" \
          BUILD_DIR="$(pwd)/build"

    - name: Build FakeLag main app (no signing)
      run: |
        xcodebuild build \
          -project FakeLag.xcodeproj \
          -scheme FakeLag \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PROVISIONING_PROFILE="" \
          DEVELOPMENT_TEAM="" \
          BUILD_DIR="$(pwd)/build"

    - name: Show build output structure
      run: |
        echo "=== Build dir ==="
        find $(pwd)/build/Release-iphoneos -maxdepth 3 2>/dev/null || true

    - name: Package IPA (unsigned, includes tunnel extension)
      run: |
        APP_PATH=$(find $(pwd)/build/Release-iphoneos -name "FakeLag.app" -type d | head -1)
        echo "Main .app: $APP_PATH"

        mkdir -p Payload
        cp -r "$APP_PATH" Payload/

        # Verify the PlugIns/FakeLagTunnel.appex is embedded
        ls -la "Payload/FakeLag.app/PlugIns/" 2>/dev/null || echo "No PlugIns dir yet"

        zip -qr FakeLag-unsigned.ipa Payload/
        echo "IPA created: $(ls -lh FakeLag-unsigned.ipa)"

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeLag-IPA
        path: FakeLag-unsigned.ipa
        retention-days: 30

    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "FakeLag v${{ github.run_number }} - System Lag"
        body: |
          ## FakeLag iOS App - System-wide Network Lag (Unsigned IPA)

          ### 🌐 Tính năng mới: Lag toàn hệ thống
          - **Packet Tunnel VPN** — làm nghẽn mọi gói tin IP trên toàn thiết bị (kể cả Free Fire!)
          - Lần đầu chạy: iOS sẽ hỏi "Add VPN Configuration?" → bấm **Allow**
          - Sau đó mỗi lần nhấn START sẽ tự động bật lag 800ms, tắt sau 2 giây

          ### 📱 Cài đặt (cần TrollStore)
          - **TrollStore**: Kéo IPA vào TrollStore → Install
          - ⚠️ Cần cài qua **TrollStore** để entitlement network extension có hiệu lực

          ### 🎮 Hướng dẫn sử dụng
          1. Nhấn nút **START** to ở giữa
          2. App tự động mở **Garena Free Fire** (hoặc Free Fire MAX)
          3. Sau **2 giây** → VPN tunnel kích hoạt → lag 800ms/gói trên toàn hệ thống
          4. Sau **2 giây** tiếp → lag tự tắt
          5. Dùng thanh trượt để thay đổi kích thước nút

          ### ⚙️ Kỹ thuật
          - `NEPacketTunnelProvider` intercepts all IP packets
          - App Group `group.com.fakelag.app` để sync trạng thái giữa app và tunnel
          - Fallback về URLProtocol nếu VPN setup thất bại
        files: FakeLag-unsigned.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
